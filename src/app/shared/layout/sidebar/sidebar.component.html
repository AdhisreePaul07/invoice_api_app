<aside
  class="app-menubar-tabs"
  id="appMenubar"
  [class.open]="sidebarOpen$ | async"
>
  <div class="app-navbar-tabs" data-simplebar="">
    <ul class="nav" id="appMenubarTabs" role="tablist" aria-orientation="vertical">
      <li class="nav-item" data-app-toggle="tooltip" data-app-placement="right" data-app-title="Dashboard">
        <button
          type="button"
          class="menu-link"
          [class.active]="activeTabId === 'dashboard'"
          aria-controls="dashboardTab"
          [attr.aria-selected]="activeTabId === 'dashboard'"
          (click)="selectTab('dashboard')"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path opacity="0.5" d="M2 12.2039C2 9.91549 2 8.77128 2.5192 7.82274C3.0384 6.87421 3.98695 6.28551 5.88403 5.10813L7.88403 3.86687C9.88939 2.62229 10.8921 2 12 2C13.1079 2 14.1106 2.62229 16.116 3.86687L18.116 5.10812C20.0131 6.28551 20.9616 6.87421 21.4808 7.82274C22 8.77128 22 9.91549 22 12.2039V13.725C22 17.6258 22 19.5763 20.8284 20.7881C19.6569 22 17.7712 22 14 22H10C6.22876 22 4.34315 22 3.17157 20.7881C2 19.5763 2 17.6258 2 13.725V12.2039Z" stroke="var(--app-heading-color)" stroke-width="2"></path>
            <path d="M12 15V18" stroke="var(--app-heading-color)" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
      </li>
      <li class="nav-item" data-app-toggle="tooltip" data-app-placement="right" data-app-title="CRM">
        <button
          type="button"
          class="menu-link"
          [class.active]="activeTabId === 'crm'"
          aria-controls="crmTab"
          [attr.aria-selected]="activeTabId === 'crm'"
          (click)="selectTab('crm')"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path opacity="0.5" d="M4 8C4 6.11438 4 5.17157 4.58579 4.58579C5.17157 4 6.11438 4 8 4H16C17.8856 4 18.8284 4 19.4142 4.58579C20 5.17157 20 6.11438 20 8V16C20 17.8856 20 18.8284 19.4142 19.4142C18.8284 20 17.8856 20 16 20H8C6.11438 20 5.17157 20 4.58579 19.4142C4 18.8284 4 17.8856 4 16V8Z" stroke="var(--app-heading-color)" stroke-width="2"></path>
            <path d="M8 9H12" stroke="var(--app-heading-color)" stroke-width="2" stroke-linecap="round"></path>
            <path d="M8 13H16" stroke="var(--app-heading-color)" stroke-width="2" stroke-linecap="round"></path>
            <path d="M8 17H13" stroke="var(--app-heading-color)" stroke-width="2" stroke-linecap="round"></path>
            <path d="M16.5 9.5C17.3284 9.5 18 8.82843 18 8C18 7.17157 17.3284 6.5 16.5 6.5C15.6716 6.5 15 7.17157 15 8C15 8.82843 15.6716 9.5 16.5 9.5Z" stroke="var(--app-heading-color)" stroke-width="2"></path>
          </svg>
        </button>
      </li>
      <li class="nav-item" data-app-toggle="tooltip" data-app-placement="right" data-app-title="Invoice">
        <button
          type="button"
          class="menu-link"
          [class.active]="activeTabId === 'invoice'"
          aria-controls="invoiceTab"
          [attr.aria-selected]="activeTabId === 'invoice'"
          (click)="selectTab('invoice')"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path opacity="0.5" d="M6 3C4.89543 3 4 3.89543 4 5V19C4 20.1046 4.89543 21 6 21H18C19.1046 21 20 20.1046 20 19V8.82843C20 8.29799 19.7893 7.78929 19.4142 7.41421L15.5858 3.58579C15.2107 3.21071 14.702 3 14.1716 3H6Z" stroke="var(--app-heading-color)" stroke-width="2"></path>
            <path d="M14 3V7C14 8.10457 14.8954 9 16 9H20" stroke="var(--app-heading-color)" stroke-width="2"></path>
            <path d="M8 13H16" stroke="var(--app-heading-color)" stroke-width="2" stroke-linecap="round"></path>
            <path d="M8 17H13" stroke="var(--app-heading-color)" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
      </li>
      <li class="nav-item mb-auto" data-app-toggle="tooltip" data-app-placement="right" data-app-title="Add Customer">
        <a href="" class="btn btn-icon btn-lg btn-white waves-effect waves-light" (click)="openAddCustomer($event)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path opacity="0.5" d="M2 12C2 7.28595 2 4.92893 3.46447 3.46447C4.92893 2 7.28595 2 12 2C16.714 2 19.0711 2 20.5355 3.46447C22 4.92893 22 7.28595 22 12C22 16.714 22 19.0711 20.5355 20.5355C19.0711 22 16.714 22 12 22C7.28595 22 4.92893 22 3.46447 20.5355C2 19.0711 2 16.714 2 12Z" stroke="var(--app-primary)" stroke-width="2"></path>
            <path d="M15 12H12M12 12H9M12 12V9M12 12V15" stroke="var(--app-primary)" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </a>
      </li>
      <li class="nav-item-hr mt-4"></li>
      <li class="nav-item mt-4" data-app-toggle="tooltip" data-app-placement="right" data-app-title="Profile">
        <button
          type="button"
          class="menu-link"
          [class.active]="activeTabId === 'profile'"
          aria-label="Profile"
          (click)="openProfileMenu()"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8C18 11.3137 15.3137 14 12 14C8.68629 14 6 11.3137 6 8C6 4.68629 8.68629 2 12 2C15.3137 2 18 4.68629 18 8Z" stroke="var(--app-heading-color)" stroke-width="2"></path>
            <path opacity="0.5" d="M4 20.0001C4 16.6864 7.58172 14.0001 12 14.0001C16.4183 14.0001 20 16.6864 20 20.0001" stroke="var(--app-heading-color)" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
      </li>
    </ul>
  </div>
  <div class="app-tab-content">
    <div class="app-side-brands">
      <a class="navbar-brand-text" href="/" (click)="onItemClick({ kind: 'item', route: '/' }, $event)">
        <img src="/assets/images/clienet-logo.png" alt="Clienet logo">
      </a>
    </div>
    <div class="app-content-inner">
      <div class="tab-content" id="appMenubarTabsContent">
        <div
          class="tab-pane fade"
          *ngFor="let tab of tabs"
          [class.show]="activeTabId === tab.id"
          [class.active]="activeTabId === tab.id"
          [id]="tab.id + 'Tab'"
          role="tabpanel"
          tabindex="0"
        >
          <nav class="app-navbar" data-simplebar="">
            <ul class="side-menubar">
              <ng-container *ngFor="let entry of tab.entries">
                <li class="menu-heading" *ngIf="entry.kind === 'heading'">
                  <span class="menu-label">{{ entry.label }}</span>
                </li>
                <li *ngIf="entry.kind === 'divider'">
                  <div class="menu-divider"></div>
                </li>
                <li class="menu-item" *ngIf="entry.kind === 'item'">
                  <a
                    class="menu-link"
                    [class.active]="isEntryActive(entry)"
                    [attr.href]="entry.route || '#'"
                    (click)="onItemClick(entry, $event)"
                  >
                    <ng-container *ngIf="entry.iconClass; else entryChip">
                      <i [class]="entry.iconClass"></i>
                    </ng-container>
                    <ng-template #entryChip>
                      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="20" height="20" rx="6" [attr.fill]="entry.chipColor || 'var(--app-primary)'"></rect>
                      </svg>
                    </ng-template>
                    <span class="menu-label">{{ entry.label }}</span>
                    <span *ngIf="entry.badgeText" class="badge badge-sm" [ngClass]="entry.badgeClass">{{ entry.badgeText }}</span>
                  </a>
                </li>
              </ng-container>
            </ul>
          </nav>
        </div>
      </div>
      <div class="card card-gradient mx-3 d-none d-xl-block">
        <div class="card-body">
          <h5>Clienet Workspace</h5>
          <p class="text-1xs">Track clients, invoices, and team activity from one place.</p>
          <a
            target="_blank"
            rel="noreferrer"
            href="https://themeforest.net/item/nexlink-crm-admin-dashboard-bootstrap-template/60903033"
            class="btn btn-primary waves-effect"
          >
            Open Workspace
          </a>
        </div>
      </div>
    </div>
  </div>
</aside>

<div
  class="modal fade"
  id="addCustomerModal"
  tabindex="-1"
  aria-labelledby="addCustomerModal"
  aria-hidden="true"
  [class.show]="addCustomerOpen"
  [class.d-block]="addCustomerOpen"
  [style.display]="addCustomerOpen ? 'block' : 'none'"
  (click)="closeAddCustomer()"
>
  <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">New Customer</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="closeAddCustomer()"></button>
      </div>
      <div class="modal-body">
        <form class="row">
          <div class="col-lg-6 mb-3">
            <label class="form-label">Customer Name</label>
            <input type="text" class="form-control" placeholder="Enter full name">
          </div>
          <div class="col-lg-6 mb-3">
            <label class="form-label">Email Address</label>
            <input type="text" class="form-control" placeholder="Enter email">
          </div>
          <div class="col-lg-6 mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" placeholder="e.g. +1 234 567 8900">
          </div>
          <div class="col-lg-6 mb-3">
            <label class="form-label">Company</label>
            <input type="text" class="form-control" placeholder="Company name">
          </div>
          <div class="col-lg-6 mb-3">
            <label class="form-label">Country</label>
            <select class="form-select">
              <option value="">Select country</option>
              <option value="US">United States</option>
              <option value="UK">United Kingdom</option>
              <option value="IN">India</option>
              <option value="CA">Canada</option>
              <option value="DE">Germany</option>
              <option value="FR">France</option>
              <option value="JP">Japan</option>
              <option value="BR">Brazil</option>
              <option value="EG">Egypt</option>
            </select>
          </div>
          <div class="col-lg-6 mb-3">
            <label class="form-label">Customer Type</label>
            <select class="form-select">
              <option value="">Select type</option>
              <option value="Lead">Lead</option>
              <option value="Prospect">Prospect</option>
              <option value="Client">Client</option>
            </select>
          </div>
          <div class="col-lg-6 mb-3">
            <label class="form-label">Account Status</label>
            <select class="form-select">
              <option value="">Select status</option>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
              <option value="Blocked">Blocked</option>
            </select>
          </div>
          <div class="col-lg-6 mb-3">
            <label class="form-label">Joined Date</label>
            <input type="text" class="form-control flatpickr-date" readonly="readonly">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" (click)="closeAddCustomer()">Cancel</button>
        <button type="button" class="btn btn-primary ms-2" (click)="closeAddCustomer()">Add Customer</button>
      </div>
    </div>
  </div>
</div>
